# SwiftLint configuration for the Pulse iOS app.
# CI runs `swiftlint lint --strict` from the ios/ directory, so warnings fail the build.
# PulseTests/ has a nested config that relaxes test-only idioms (fixture force-unwraps etc.).

excluded:
  - Pulse.xcodeproj # generated by xcodegen
  - build # local DerivedData
  - DerivedData
  - .build

opt_in_rules:
  - empty_count
  - force_unwrapping
  - first_where
  - sorted_first_last

disabled_rules:
  - todo # don't fail CI on TODO/FIXME comments
  - large_tuple # small ad-hoc tuples are idiomatic in this codebase's helpers

line_length:
  warning: 140
  error: 200

type_body_length:
  warning: 450

file_length:
  warning: 600

function_body_length:
  warning: 100

function_parameter_count:
  warning: 8

identifier_name:
  # House style: single-letter locals are common in geometry/closure-heavy SwiftUI code.
  min_length:
    warning: 1

type_name:
  excluded:
    - FG # Theme.FG — intentional palette namespace (see Theme.swift)
    - BG # Theme.BG — intentional palette namespace
