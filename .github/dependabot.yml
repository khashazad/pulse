version: 2
updates:
  # Keep SHA-pinned actions current (Dependabot updates the pin + version comment).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"

  # Server Python dependencies via uv.lock.
  - package-ecosystem: uv
    directory: "/server"
    schedule:
      interval: weekly
    groups:
      python:
        patterns:
          - "*"

  # No `swift` ecosystem entry: the iOS app has no SPM packages to track.
