name: Server CI

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/server-ci.yml"
      - ".github/actions/setup-server/**"
  pull_request:
    # KEEP IN SYNC: this list must stay an exact mirror of the `paths-ignore`
    # list in server-ci-skip.yml, or PRs can end up with a `server-gate`
    # required check that never reports (blocked forever).
    paths:
      - "server/**"
      - ".github/workflows/server-ci.yml"
      - ".github/actions/setup-server/**"

# Least privilege: jobs only read the checkout. Override per-job if a step needs more.
permissions:
  contents: read

# Cancel superseded runs on PR branches, but never on main: each main commit is
# keyed by SHA so a quick follow-up merge can't cancel the previous commit's
# checks (Railway "wait for CI" and commit history both read per-commit status).
concurrency:
  group: server-ci-${{ github.ref == 'refs/heads/main' && github.sha || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: server

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup server toolchain
        uses: ./.github/actions/setup-server

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  typecheck:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup server toolchain
        uses: ./.github/actions/setup-server

      - name: mypy
        run: uv run mypy src

  unit:
    name: unit tests (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.11 mirrors the Docker runtime (python:3.11-slim); 3.12 is the forward check.
        python: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup server toolchain
        uses: ./.github/actions/setup-server
        with:
          python-version: ${{ matrix.python }}

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql://localhost/test
          USDA_API_KEY: test
          APP_ENV: test
        run: uv run pytest -q -m "not integration"

  integration:
    name: full suite + coverage (postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pulse_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d pulse_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pulse_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pulse_test
      USDA_API_KEY: test
      APP_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # Pinned to 3.11 so the full suite (integration included) runs on the same
      # interpreter as the production image (python:3.11-slim). 3.12 coverage of
      # the unit tests comes from the unit matrix.
      - name: Setup server toolchain
        uses: ./.github/actions/setup-server
        with:
          python-version: "3.11"

      # Unit + integration together so coverage reflects the whole suite;
      # the 80% gate comes from [tool.coverage.report] fail_under.
      - name: Full test suite with coverage
        run: uv run pytest -q --cov=pulse_server --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: server-coverage
          path: server/coverage.xml

  docker-build:
    name: docker build + scan + boot smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pulse_smoke
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d pulse_smoke"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./server
          file: ./server/Dockerfile
          push: false
          load: true
          tags: pulse-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: pulse-server:ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: server/.trivyignore

      # APP_ENV=production so the non-local startup validators (MCP auth, HTTPS
      # redirect, allowlist) actually run — a local-mode boot would skip them
      # all. The dummy MCP_SERVICE_TOKEN is the minimal valid non-local config.
      - name: Boot smoke test (production mode)
        working-directory: .
        run: |
          docker run -d --name pulse-smoke --network host \
            -e DATABASE_URL=postgresql://postgres:postgres@localhost:5432/pulse_smoke \
            -e USDA_API_KEY=smoke \
            -e APP_ENV=production \
            -e MCP_SERVICE_TOKEN=ci-smoke-dummy-token-0123456789abcdefghijklmnop \
            -e S3_ENDPOINT=https://smoke.r2.cloudflarestorage.com \
            -e S3_BUCKET=pulse-smoke \
            -e S3_ACCESS_KEY_ID=smoke \
            -e S3_SECRET_ACCESS_KEY=smoke \
            pulse-server:ci
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:8787/health > /dev/null 2>&1; then
              echo "health check passed"
              exit 0
            fi
            sleep 1
          done
          echo "::error::server failed to come up within 30s"
          docker logs pulse-smoke
          exit 1

  server-gate:
    name: server-gate
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit, integration, docker-build]
    if: always()
    steps:
      # Deliberately strict: anything other than 'success' (failure, cancelled,
      # AND skipped) fails the gate, so a future `if:` on a needed job can't
      # silently pass unvalidated code.
      - name: Check all jobs passed
        working-directory: .
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          echo "job results: $RESULTS"
          for r in $RESULTS; do
            if [ "$r" != "success" ]; then
              echo "::error::a required server job finished with status '$r'"
              exit 1
            fi
          done
