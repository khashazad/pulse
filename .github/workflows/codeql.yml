name: CodeQL

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/codeql.yml"
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/codeql.yml"
  schedule:
    - cron: "17 6 * * 1" # weekly, Monday 06:17 UTC

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL (python)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          languages: python
          build-mode: none
          queries: security-extended

      - name: Analyze
        uses: github/codeql-action/analyze@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          category: /language:python
