name: CodeQL

# No paths filter: CodeQL must report on EVERY PR so 'CodeQL (python)' can be a
# required status check without deadlocking iOS-only/docs-only PRs (a
# path-filtered required check never reports on out-of-path PRs). The analysis
# is cheap enough to run unconditionally.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 6 * * 1" # weekly, Monday 06:17 UTC

permissions:
  contents: read

# Cancel superseded runs on PR branches, but never on main (per-SHA group there).
concurrency:
  group: codeql-${{ github.ref == 'refs/heads/main' && github.sha || github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL (python)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          languages: python
          build-mode: none
          queries: security-extended

      - name: Analyze
        uses: github/codeql-action/analyze@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          category: /language:python
